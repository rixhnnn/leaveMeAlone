<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/reset.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <link rel="stylesheet" href="/style.css" />
    <title>AniRise</title>
  </head>
  <body>
    <header
      class="header bg-black"
      x-data="{ menuOpen: false, searchOpen: false, authOpen: false }"
    >
      <div class="header__inner max-w-7xl mx-auto px-6 flex items-center h-16">
        <button
          @click="menuOpen = !menuOpen"
          class="header__burger mr-4 text-white/70 hover:text-white transition-colors"
        >
          <svg
            class="w-6 h-6"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>

        <a href="/" class="header__logo flex items-center gap-2 mr-10">
          <span class="text-orange-500 text-2xl font-black">A</span>
          <span class="text-white text-xl font-bold tracking-wide"
            >AniRise</span
          >
        </a>

        <nav class="header__nav">
          <a
            href="#"
            class="header__nav-link text-white/70 hover:text-white text-sm font-medium px-4 py-2 rounded transition-colors uppercase tracking-wider"
            >Главная</a
          >
          <a
            href="#"
            class="header__nav-link text-white/70 hover:text-white text-sm font-medium px-4 py-2 rounded transition-colors uppercase tracking-wider"
            >Аниме</a
          >
          <a
            href="#"
            class="header__nav-link text-white/70 hover:text-white text-sm font-medium px-4 py-2 rounded transition-colors uppercase tracking-wider"
            >Топ-100</a
          >
          <a
            href="#"
            class="header__nav-link text-white/70 hover:text-white text-sm font-medium px-4 py-2 rounded transition-colors uppercase tracking-wider"
            >Случайное</a
          >
          <a
            href="#"
            class="header__nav-link text-white/70 hover:text-white text-sm font-medium px-4 py-2 rounded transition-colors uppercase tracking-wider"
            >Сообщество</a
          >
        </nav>

        <div class="header__actions flex items-center gap-5 ml-auto">
          <button
            @click="searchOpen = true"
            class="text-white/70 hover:text-white transition-colors p-2"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <circle cx="11" cy="11" r="7" />
              <line x1="16.5" y1="16.5" x2="22" y2="22" />
            </svg>
          </button>

          <div class="w-px h-5 bg-white/20"></div>

          <div class="relative">
            <button
              @click="authOpen = !authOpen"
              class="flex items-center gap-2 text-white/70 hover:text-white transition-colors"
            >
              <div
                class="w-8 h-8 rounded-full border-2 border-white/40 flex items-center justify-center"
              >
                <svg
                  class="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  viewBox="0 0 24 24"
                >
                  <circle cx="12" cy="8" r="4" />
                  <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
                </svg>
              </div>
              <span
                class="header__auth-text text-sm font-medium uppercase tracking-wider"
                >Войти</span
              >
            </button>

            <div
              x-show="authOpen"
              @click.outside="authOpen = false"
              x-transition
              class="absolute right-0 top-12 bg-white rounded-2xl shadow-2xl p-6 w-72 z-50"
            >
              <h3 class="text-gray-900 font-bold text-lg mb-4">Вход</h3>
              <input
                type="text"
                placeholder="Логин или email"
                class="w-full bg-gray-100 rounded-xl px-4 py-3 text-sm outline-none mb-3 text-gray-900 placeholder-gray-400"
              />
              <input
                type="password"
                placeholder="Пароль"
                class="w-full bg-gray-100 rounded-xl px-4 py-3 text-sm outline-none mb-4 text-gray-900 placeholder-gray-400"
              />
              <button
                class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3 rounded-xl transition-colors text-sm"
              >
                Войти
              </button>
              <div class="mt-4 text-center text-sm text-gray-400">
                Нет аккаунта?
                <a
                  href="#"
                  class="text-orange-500 hover:text-orange-600 font-semibold"
                  >Регистрация</a
                >
              </div>
            </div>
          </div>
        </div>
      </div>

      <div
        x-show="menuOpen"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 -translate-x-full"
        x-transition:enter-end="opacity-100 translate-x-0"
        x-transition:leave="transition ease-in duration-150"
        x-transition:leave-start="opacity-100 translate-x-0"
        x-transition:leave-end="opacity-0 -translate-x-full"
        class="header__drawer fixed top-0 left-0 h-full w-72 bg-black z-50 flex flex-col px-6 py-8 shadow-2xl"
      >
        <div class="flex items-center justify-between mb-8">
          <a href="/" class="flex items-center gap-2">
            <span class="text-orange-500 text-2xl font-black">A</span>
            <span class="text-white text-xl font-bold tracking-wide"
              >AniRise</span
            >
          </a>
          <button
            @click="menuOpen = false"
            class="text-white/50 hover:text-white transition-colors"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>

        <nav class="flex flex-col gap-1">
          <a
            href="#"
            class="text-white/70 hover:text-white hover:bg-white/5 px-4 py-3 rounded-lg text-sm font-medium uppercase tracking-wider transition-colors"
            >Главная</a
          >
          <a
            href="#"
            class="text-white/70 hover:text-white hover:bg-white/5 px-4 py-3 rounded-lg text-sm font-medium uppercase tracking-wider transition-colors"
            >Аниме</a
          >
          <a
            href="#"
            class="text-white/70 hover:text-white hover:bg-white/5 px-4 py-3 rounded-lg text-sm font-medium uppercase tracking-wider transition-colors"
            >Топ-100</a
          >
          <a
            href="#"
            class="text-white/70 hover:text-white hover:bg-white/5 px-4 py-3 rounded-lg text-sm font-medium uppercase tracking-wider transition-colors"
            >Случайное</a
          >
          <a
            href="#"
            class="text-white/70 hover:text-white hover:bg-white/5 px-4 py-3 rounded-lg text-sm font-medium uppercase tracking-wider transition-colors"
            >Сообщество</a
          >
        </nav>
      </div>

      <div
        x-show="menuOpen"
        @click="menuOpen = false"
        class="fixed inset-0 bg-black/50 z-40"
      ></div>

      <div
        x-show="searchOpen"
        @keydown.escape.window="searchOpen = false"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100"
        x-transition:leave="transition ease-in duration-150"
        x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
        class="fixed inset-0 bg-white z-50 flex flex-col px-6 py-8"
      >
        <div class="flex items-center justify-between mb-8">
          <span class="text-gray-900 text-2xl font-bold">Поиск</span>
          <button
            @click="searchOpen = false"
            class="text-gray-400 hover:text-gray-900 transition-colors"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div class="flex items-center gap-4 bg-gray-100 rounded-2xl px-6 py-4">
          <svg
            class="w-5 h-5 text-gray-400 flex-shrink-0"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <circle cx="11" cy="11" r="7" />
            <line x1="16.5" y1="16.5" x2="22" y2="22" />
          </svg>
          <input
            type="text"
            placeholder="Введите название аниме..."
            class="bg-transparent text-gray-900 text-lg outline-none placeholder-gray-400 w-full"
            x-ref="searchInput"
            x-init="$watch('searchOpen', val => val && $nextTick(() => $refs.searchInput.focus()))"
          />
        </div>
      </div>
    </header>
  </body>
</html>
